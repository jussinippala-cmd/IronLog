<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080810;overscroll-behavior:none}
body{font-family:'DM Sans',sans-serif;color:#f2f0ea;max-width:430px;margin:0 auto}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ex-card{animation:slideUp .25s ease both}
.yt-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;margin-left:6px;background:#FF0000;color:#fff;border-radius:4px;font-size:9px;text-decoration:none;vertical-align:middle;opacity:0.85;transition:opacity .15s}
.yt-btn:hover{opacity:1}
.pop-in{animation:pop .35s ease}
.rest-pulse{animation:pulse 1s infinite}
.fade-in{animation:fadeIn .2s ease}
/* Layout */
#app{min-height:100vh}
.page{padding:24px 20px 110px}
.hdr{padding:48px 20px 0;display:flex;justify-content:space-between;align-items:flex-start}
/* Typography */
.logo{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.15em;color:#d4a846}
.hdr-sub{font-size:12px;color:#9090b0;margin-top:2px}
.h1{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;line-height:1;margin-bottom:4px}
.h2{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:12px}
.sub{font-size:13px;color:#9090b0;margin-bottom:24px}
.sec-title{font-size:12px;color:#9090b0;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:10px}
/* Cards */
.card{background:#10101a;border:1px solid #1c1c2e;border-radius:16px;padding:16px 18px;margin-bottom:10px}
.acard{background:#141420;border:1px solid #d4a84633;border-radius:16px;padding:16px 18px;margin-bottom:10px}
.scard{background:#1a1810;border:1px solid #e8c55a33;border-radius:16px;padding:14px 18px;margin-bottom:10px}
/* Stats */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:28px}
.stat-box{background:#10101a;border:1px solid #1c1c2e;border-radius:14px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:#d4a846;line-height:1}
.stat-val span{font-size:16px;color:#9090b0}
.stat-lbl{font-size:10px;color:#9090b0;margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
/* Buttons */
.btn-primary{background:#d4a846;color:#080810;border:none;border-radius:14px;padding:17px 24px;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.06em;width:100%}
.btn-primary:disabled{opacity:.35;cursor:default}
.free-pill{background:#1c1c2e;color:#9090b0;border:none;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit}
.free-pill.active{background:#d4a846;color:#080810;font-weight:700}
.btn-ghost{background:transparent;color:#f2f0ea;border:1px solid #1c1c2e;border-radius:14px;
  padding:13px 24px;font-weight:600;font-size:14px;width:100%}
.btn-back{background:none;border:none;color:#d4a846;font-weight:700;font-size:13px;padding:0}
.btn-tiny{background:transparent;color:#9090b0;border:1px solid #1c1c2e;border-radius:8px;padding:6px 12px;font-size:12px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#1c1c2e;border-radius:12px;cursor:pointer;transition:.2s}
.toggle .slider::before{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;background:#9090b0;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#d4a846}
.toggle input:checked+.slider::before{transform:translateX(20px);background:#0a0a14}
.btn-swap{background:#1c1c30;border:1px solid #1c1c2e;border-radius:8px;padding:4px 10px;
  color:#9090b0;font-size:11px;font-weight:600;white-space:nowrap}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:#0c0c18;border-top:1px solid #1c1c2e;display:flex;
  padding:10px 0 max(22px,env(safe-area-inset-bottom,22px));z-index:100}
.nav-btn{flex:1;background:none;border:none;font-size:10px;font-weight:500;color:#9090b0;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;
  letter-spacing:.04em;text-transform:uppercase}
.nav-btn.active{color:#d4a846;font-weight:700}
/* Tags */
.tag{display:inline-block;background:#1c1c30;border-radius:6px;padding:2px 8px;font-size:11px;color:#9090b0;margin-right:4px}
.mtag{display:inline-block;background:#1a1a2e;border-radius:4px;padding:1px 7px;font-size:10px;
  color:#a0a0c0;margin-left:6px;font-weight:600;letter-spacing:.04em;vertical-align:middle}
.badge{display:inline-block;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}
/* Progress */
.progress-track{background:#10101a;border-radius:99px;height:5px;margin-bottom:20px;overflow:hidden}
.progress-fill{background:#d4a846;height:100%;border-radius:99px;transition:width .4s ease}
/* Rest bar */
.rest-bar{position:fixed;bottom:calc(60px + max(22px,env(safe-area-inset-bottom,22px)));left:50%;transform:translateX(-50%);
  width:80%;max-width:350px;height:20vh;min-height:120px;
  background:#0c0c1af0;backdrop-filter:blur(16px);z-index:200;padding:20px 24px;
  display:none;flex-direction:column;justify-content:center;align-items:center;gap:16px;
  border:1px solid #d4a84655;border-radius:20px;box-shadow:0 8px 32px #00000088}
.rest-bar.visible{display:flex;animation:pop .3s ease}
/* Exercise card header */
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ex-title-area{flex:1}
.ex-title{font-weight:700;font-size:16px;display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.ex-meta{font-size:11px;color:#9090b0;margin-top:2px}
.ex-actions{display:flex;gap:6px;align-items:center;margin-left:8px;flex-shrink:0}
.cue-box{background:#0a0a18;border-radius:8px;padding:7px 10px;margin-bottom:10px;
  font-size:11px;color:#5555aa;border-left:2px solid #d4a84644}
.last-info{font-size:11px;color:#9090b0;margin-bottom:10px}
/* Set grid */
.set-grid{display:grid;grid-template-columns:28px 1fr 1fr 52px;gap:6px;align-items:center;margin-bottom:6px}
.set-col-hdr{display:grid;grid-template-columns:28px 1fr 1fr 52px;gap:6px;margin-bottom:6px}
.set-col-hdr span{font-size:10px;color:#9090b0;text-align:center;text-transform:uppercase;letter-spacing:.05em}
.set-num{text-align:center;font-size:12px;font-weight:700;color:#9090b0}
.set-num.done{color:#d4a846}
/* Reps button */
.rep-btn{background:#080810;border:1px solid #1c1c2e;border-radius:10px;padding:11px 8px;
  color:#9090b0;font-size:15px;width:100%;text-align:center;font-weight:400}
.rep-btn.has-val{color:#f2f0ea;font-weight:700}
.rep-btn.editing{border-color:#ee8877}
.rep-btn.below-min{color:#e05555}
.rep-display{background:#d4a84618;border:1px solid #d4a84655;border-radius:10px;padding:11px 8px;
  color:#d4a846;font-weight:700;font-size:15px;text-align:center}
.rep-display.below-min{color:#e05555;background:#e0555518}
/* KG input */
.kg-inp{background:#080810;border:1px solid #1c1c2e;border-radius:10px;padding:11px 12px;
  color:#f2f0ea;font-size:15px;text-align:center;width:100%}
.kg-inp:focus{border-color:#d4a846;outline:none}
.kg-inp.editing{border-color:#ee8877}
.kg-display{background:#d4a84618;border:1px solid #d4a84655;border-radius:10px;padding:11px 8px;
  color:#d4a846;font-weight:700;font-size:15px;text-align:center}
/* Action buttons */
.btn-check{background:#d4a846;border:none;border-radius:10px;padding:11px 0;
  color:#080810;font-weight:800;font-size:13px;width:100%}
.btn-check.dim{opacity:.4;cursor:default}
.btn-emoji{background:none;border:none;font-size:22px;width:100%;text-align:center;padding:4px 0}
/* Swap modal */
.modal-overlay{position:fixed;inset:0;background:#000000cc;z-index:500;
  display:flex;align-items:flex-end;animation:fadeIn .2s ease}
.modal-sheet{background:#12121e;border-radius:20px 20px 0 0;width:100%;max-width:430px;
  margin:0 auto;max-height:75vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hdr{padding:18px 20px 12px;border-bottom:1px solid #1c1c2e;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-body{overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch}
.swap-item{padding:12px 14px;border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid #1c1c2e}
.swap-item.active{background:#1a1810;border-color:#d4a846}
.swap-item.in-use{background:#14141e;opacity:.4;cursor:default}
.swap-item.available{background:#16161e}
.swap-row{display:flex;justify-content:space-between;align-items:center}
.swap-cue{font-size:11px;color:#9090b0;margin-top:4px}
/* Block selector */
.block-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.block-tab{padding:8px 4px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;
  border-radius:10px;letter-spacing:.02em;line-height:1.2;border:2px solid transparent}
/* Day list */
.day-card{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.day-arrow{color:#9090b0;font-size:18px}
/* Complete */
.complete-center{text-align:center;padding-top:56px;padding-bottom:28px}
/* Misc */
.row{display:flex;justify-content:space-between;align-items:center}
.ex-pill{background:#0a0a18;border-radius:8px;padding:5px 10px;
  display:inline-flex;align-items:center;gap:6px;margin:3px;font-size:12px}
.hint-text{font-size:10px;color:#9090b0;text-align:right;margin-bottom:8px;letter-spacing:.03em}
/* Onboarding */
.ob-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.ob-title{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:#d4a846;margin-bottom:4px;line-height:1}
.ob-sub{font-size:14px;color:#9090b0;margin-bottom:36px;line-height:1.5}
.ob-section{width:100%;max-width:360px;margin-bottom:28px;text-align:left}
.ob-label{font-size:11px;color:#9090b0;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:10px}
.ob-options{display:flex;gap:8px;flex-wrap:wrap}
.ob-opt{flex:1;min-width:0;background:#10101a;border:2px solid #1c1c2e;border-radius:14px;padding:14px 8px;
  text-align:center;cursor:pointer;transition:all .15s ease;font-size:14px;font-weight:600;color:#9090b0}
.ob-opt:hover{border-color:#9090b0}
.ob-opt.selected{border-color:#d4a846;color:#d4a846;background:#1a1810}
.ob-opt .ob-opt-big{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;margin-bottom:2px}
.ob-opt .ob-opt-sm{font-size:10px;color:#9090b0;margin-top:2px}
.ob-opt.selected .ob-opt-sm{color:#d4a846aa}
.ob-sex{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ob-sex .ob-opt{padding:18px 12px}
.ob-sex .ob-opt .ob-emoji{font-size:28px;margin-bottom:4px}
.ob-start{margin-top:12px;width:100%;max-width:360px}
.ob-profile-row{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px}
.ob-profile-tag{background:#1c1c30;border-radius:8px;padding:4px 12px;font-size:12px;color:#9090b0;cursor:pointer}
.ob-profile-tag:hover{color:#d4a846;border-color:#d4a846}
.chart-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chart-pills::-webkit-scrollbar{display:none}
.chart-pill{background:#1c1c30;border:1px solid #1c1c2e;border-radius:8px;padding:5px 12px;font-size:12px;color:#9090b0;white-space:nowrap;flex-shrink:0;font-family:inherit;cursor:pointer}
.chart-pill.active{border-color:#d4a846;color:#d4a846;background:#1a1810}
</style>
</head>

const ls={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// PROFILE
// ═══════════════════════════════════════════════════════════════════
function getProfile(){return ls.get("il_profile")||null;}
function saveProfile(p){ls.set("il_profile",p);}
function getSettings(){return ls.get("il_settings")||{restSeconds:90};}
function saveSetting(key,val){const s=getSettings();s[key]=val;ls.set("il_settings",s);}
function getRestDuration(){const s=getSettings();return s.restSeconds!==undefined?s.restSeconds:90;}

function getLang(){return getSettings().lang||'en';}
function setLang(lang){saveSetting('lang',lang);document.documentElement.lang=lang;render();}

// PROGRAM GENERATOR — builds blocks based on profile (freq + sex)
// ═══════════════════════════════════════════════════════════════════

// Helper: pick from library by id
function _libFind(id){
  for(const g of Object.values(LIBRARY)){const x=g.find(e=>e.id===id);if(x)return x;}
  return null;
}
// Auto-detect muscle group from library
function _muscleOf(libId){
  for(const[g,arr]of Object.entries(LIBRARY)){if(arr.find(e=>e.id===libId))return g;}
  return"";
}
// Build exercise entry: Ex(blockNumber, libraryId, optionalOverrides)
function Ex(bn,libId,ov){
  const base=_libFind(libId);if(!base)return null;
  const o=ov||{};
  return{id:`b${bn}_${libId.replace('lib_','')}`,libId:libId,name:base.name,muscle:_muscleOf(libId),
    sets:o.sets!==undefined?o.sets:base.sets,repRange:o.repRange||base.repRange,cues:o.cues||base.cues};
}

function generateBlocks(profile){
  const f=profile.freq;  // 2-5
  const isFemale=profile.sex==="female";

  if(f===2) return gen2Day(isFemale);
  if(f===3) return gen3Day(isFemale);
  if(f===4) return gen4Day(isFemale);
  return gen5Day(isFemale);
}

function gen2Day(fem){
  // 2 days/week: Full Body A & B, higher volume per session, 4 blocks
  const blocks=[];
  const themes=["Barbell Compounds","Dumbbell & Machine","Strength Focus","Volume & Isolation"];
  const dayLabels=[{id:"A",label:"Full Body A",emoji:"💪"},{id:"B",label:"Full Body B",emoji:"⚡"}];

  // Block 1: Barbell Compounds
  blocks.push({id:1,label:"Block 1",theme:themes[0],days:[
    {id:"A",label:"Full Body A",focus:"Squat · Push · Pull · Arms",emoji:"💪",exercises:fem?[
      Ex(1,"lib_squat"),Ex(1,"lib_hip_thrust",{sets:4}),Ex(1,"lib_bench",{sets:3}),Ex(1,"lib_cable_row",{sets:4}),
      Ex(1,"lib_rdl"),Ex(1,"lib_lat_pull"),Ex(1,"lib_lat_raise"),Ex(1,"lib_abduction"),Ex(1,"lib_bb_curl")
    ]:[
      Ex(1,"lib_squat"),Ex(1,"lib_bench"),Ex(1,"lib_cable_row",{sets:4}),Ex(1,"lib_incline_db"),
      Ex(1,"lib_lat_pull"),Ex(1,"lib_rdl"),Ex(1,"lib_lat_raise"),Ex(1,"lib_bb_curl"),Ex(1,"lib_skull")
    ]},
    {id:"B",label:"Full Body B",focus:"Hinge · Press · Row · Glutes",emoji:"⚡",exercises:fem?[
      Ex(1,"lib_deadlift"),Ex(1,"lib_leg_press"),Ex(1,"lib_db_ohp"),Ex(1,"lib_db_row",{sets:4}),
      Ex(1,"lib_leg_curl"),Ex(1,"lib_cable_fly"),Ex(1,"lib_glute_bridge"),Ex(1,"lib_face_pull"),Ex(1,"lib_standing_calf")
    ]:[
      Ex(1,"lib_deadlift"),Ex(1,"lib_ohp"),Ex(1,"lib_db_row",{sets:4}),Ex(1,"lib_leg_press"),
      Ex(1,"lib_cable_fly"),Ex(1,"lib_face_pull"),Ex(1,"lib_skull"),Ex(1,"lib_hammer"),Ex(1,"lib_standing_calf")
    ]}
  ]});

  // Block 2: Dumbbell & Machine
  blocks.push({id:2,label:"Block 2",theme:themes[1],days:[
    {id:"A",label:"Full Body A",focus:"Machine Legs · DB Push · Pull",emoji:"💪",exercises:fem?[
      Ex(2,"lib_hack_squat"),Ex(2,"lib_hip_thrust",{sets:4}),Ex(2,"lib_db_bench"),Ex(2,"lib_chest_row",{sets:4}),
      Ex(2,"lib_seated_curl"),Ex(2,"lib_pec_deck"),Ex(2,"lib_cable_raise"),Ex(2,"lib_cable_kickback"),Ex(2,"lib_seated_calf")
    ]:[
      Ex(2,"lib_hack_squat"),Ex(2,"lib_db_bench"),Ex(2,"lib_chest_row",{sets:4}),Ex(2,"lib_pec_deck"),
      Ex(2,"lib_pullover_cable"),Ex(2,"lib_seated_curl"),Ex(2,"lib_cable_raise"),Ex(2,"lib_incline_curl"),Ex(2,"lib_pushdown")
    ]},
    {id:"B",label:"Full Body B",focus:"Hinge · Shoulders · Back · Iso",emoji:"⚡",exercises:fem?[
      Ex(2,"lib_trap_dl"),Ex(2,"lib_leg_press"),Ex(2,"lib_db_ohp"),Ex(2,"lib_sa_cable_row",{sets:4}),
      Ex(2,"lib_leg_ext"),Ex(2,"lib_db_pullover"),Ex(2,"lib_rear_delt"),Ex(2,"lib_abduction"),Ex(2,"lib_leg_press_calf")
    ]:[
      Ex(2,"lib_trap_dl"),Ex(2,"lib_db_ohp"),Ex(2,"lib_sa_cable_row",{sets:4}),Ex(2,"lib_leg_press"),
      Ex(2,"lib_db_pullover"),Ex(2,"lib_rear_delt"),Ex(2,"lib_pushdown"),Ex(2,"lib_spider_curl"),Ex(2,"lib_seated_calf")

  // Block 3: Strength
  blocks.push({id:3,label:"Block 3",theme:themes[2],days:[

      Ex(3,"lib_squat",{sets:4,repRange:[4,8]}),Ex(3,"lib_hip_thrust",{sets:4,repRange:[6,10]}),Ex(3,"lib_bench",{sets:4,repRange:[6,8]}),

// Active blocks — generated from profile or default
let BLOCKS=[];
function reloadBlocks(){
  const p=getProfile();
  if(p)BLOCKS=generateBlocks(p);
}
reloadBlocks();

// ═══════════════════════════════════════════════════════════════════
// STORAGE HELPERS
// ═══════════════════════════════════════════════════════════════════
// Sessions needed per block = frequency × 2 (roughly 2 weeks of training)
function sessionsPerBlock(){
  const p=getProfile();
  return p?(p.freq*2):6;
}
function initAndGetBlockIdx(){
  if(!BLOCKS.length)return 0;
  const saved=ls.get(SK.blockIdx);
  if(saved!==null&&saved>=0&&saved<BLOCKS.length)return saved;
  ls.set(SK.blockIdx,0);
  return 0;
}
function getBlockSessionCount(){
  const idx=initAndGetBlockIdx();
  if(!BLOCKS.length)return 0;
  const blockId=BLOCKS[idx].id;
  // Count sessions done in current block (by matching blockId)
  return A.history.filter(h=>h.blockId===blockId).length;
}
function getSessionsUntilSwap(){
  return Math.max(0,sessionsPerBlock()-getBlockSessionCount());
}
function advanceBlockIfNeeded(){
  if(!BLOCKS.length)return 0;
  if(getBlockSessionCount()>=sessionsPerBlock()){
    const next=(initAndGetBlockIdx()+1)%BLOCKS.length;
    ls.set(SK.blockIdx,next);
    return next;
  }
  return initAndGetBlockIdx();
}
function getNextDayId(){return ls.get(SK.nextDay)||"A";}
function getHistory(){return ls.get(SK.history)||[];}
function getCustomWorkouts(){return ls.get(SK.customWorkouts)||[];}
function saveCustomWorkout(name,exerciseIds){
  const list=getCustomWorkouts();
  const now=Date.now();
  list.push({id:"custom_"+now,name:name,exerciseIds:exerciseIds,createdAt:now});
  ls.set(SK.customWorkouts,list);
}
function deleteCustomWorkout(id){
  ls.set(SK.customWorkouts,getCustomWorkouts().filter(w=>w.id!==id));
}
function confirmDeleteCustomWorkout(id){
  const cw=getCustomWorkouts().find(w=>w.id===id);
  if(!cw)return;
  if(confirm(t('free_delete_confirm')+' '+cw.name+'?')){deleteCustomWorkout(id);render();}
}
function getLastWeight(id){const w=(ls.get(SK.weights)||{})[id];return w!==undefined?w:null;}
function saveWeight(id,w,libId){const ws=ls.get(SK.weights)||{};ws[id]=w;if(libId)ws[libId]=w;ls.set(SK.weights,ws);}
function advanceDay(cur){
  const p=getProfile();
  const dayIds=BLOCKS.length>0?BLOCKS[0].days.map(d=>d.id):["A","B","C"];
  const idx=dayIds.indexOf(cur);
  ls.set(SK.nextDay,dayIds[(idx+1)%dayIds.length]);
}
function getExerciseHistory(id,libId){
  return getHistory().map(s=>s.exercises&&s.exercises.find(e=>e.id===id||(libId&&e.libId===libId))).filter(Boolean).slice(-5);
}
function shouldIncrease(id,topRep,libId){
  const h=getExerciseHistory(id,libId);
  return h.length>0&&h[h.length-1].sets.every(s=>parseInt(s.reps)>=topRep);
}
function getExercisesWithHistory(){
  const seen=new Map();
  A.history.forEach(s=>{
    (s.exercises||[]).forEach(ex=>{
      if(!ex.libId||seen.has(ex.libId))return;
      if((ex.sets||[]).some(st=>parseFloat(st.weight)>0))seen.set(ex.libId,true);
    });
  });
  return[...seen.keys()];
}
function getProgressData(libId){
  const points=[];
  A.history.forEach(s=>{
    const ex=(s.exercises||[]).find(e=>e.libId===libId);
    if(!ex)return;
    const wts=(ex.sets||[]).map(st=>parseFloat(st.weight)||0).filter(w=>w>0);
    if(!wts.length)return;
    points.push({date:s.date,max:Math.max(...wts)});
  });
  return points;
}
function renderProgressChart(libId){
  const data=getProgressData(libId);
  if(!data.length)return`<div style="text-align:center;color:#9090b0;font-size:13px;padding:20px 0">${t('chart_no_data')}</div>`;
  const W=390,H=200,ml=45,mr=15,mt=15,mb=30;
  const pw=W-ml-mr,ph=H-mt-mb;
  if(data.length===1){
    const cx=ml+pw/2,cy=mt+ph/2;
    return`<svg viewBox="0 0 ${W} ${H}" width="100%" height="200" style="display:block">
      <circle cx="${cx}" cy="${cy}" r="5" fill="#d4a846"/>
      <text x="${cx}" y="${cy-14}" text-anchor="middle" fill="#f2f0ea" font-size="14" font-weight="700">${data[0].max}kg</text>
      <text x="${cx}" y="${cy+20}" text-anchor="middle" fill="#9090b0" font-size="10">${fmtDate(data[0].date)}</text>
    </svg>`;
  }
  const maxes=data.map(d=>d.max);
  let yMin=Math.min(...maxes),yMax=Math.max(...maxes);
  if(yMax-yMin<5){const mid=(yMin+yMax)/2;yMin=mid-2.5;yMax=mid+2.5;}
  yMin=Math.floor(yMin/5)*5;yMax=Math.ceil(yMax/5)*5;
  if(yMax<=yMin)yMax=yMin+5;
  const yRange=yMax-yMin;
  function x(i){return ml+(i/(data.length-1))*pw;}
  function y(v){return mt+ph-(((v-yMin)/yRange)*ph);}
  const pts=data.map((d,i)=>`${x(i).toFixed(1)},${y(d.max).toFixed(1)}`);
  const line=pts.join(' ');
  const area=`${pts.join(' ')} ${x(data.length-1).toFixed(1)},${(mt+ph).toFixed(1)} ${ml.toFixed(1)},${(mt+ph).toFixed(1)}`;
  // Y-axis: 4-5 ticks
  const tickCount=4;
  let gridLines='',yLabels='';
  for(let i=0;i<=tickCount;i++){
    const val=yMin+(yRange*i/tickCount);
    const yy=y(val);
    gridLines+=`<line x1="${ml}" y1="${yy.toFixed(1)}" x2="${W-mr}" y2="${yy.toFixed(1)}" stroke="#1c1c2e" stroke-dasharray="4,4"/>`;
    yLabels+=`<text x="${ml-6}" y="${(yy+3).toFixed(1)}" text-anchor="end" fill="#9090b0" font-size="10">${Math.round(val)}</text>`;
  }
  // X-axis: max 6 labels
  let xLabels='';
  const maxLabels=Math.min(6,data.length);
  const step=Math.max(1,Math.floor((data.length-1)/(maxLabels-1)));
  for(let i=0;i<data.length;i+=step){
    xLabels+=`<text x="${x(i).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="#9090b0" font-size="9">${fmtDate(data[i].date)}</text>`;
  }
  if((data.length-1)%step!==0){
    xLabels+=`<text x="${x(data.length-1).toFixed(1)}" y="${H-4}" text-anchor="middle" fill="#9090b0" font-size="9">${fmtDate(data[data.length-1].date)}</text>`;
  }
  const dots=data.map((d,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(d.max).toFixed(1)}" r="3.5" fill="#d4a846" stroke="#10101a" stroke-width="2"/>`).join('');
  return`<svg viewBox="0 0 ${W} ${H}" width="100%" height="200" style="display:block">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a846" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4a846" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridLines}
    <polygon points="${area}" fill="url(#cg)"/>
    <polyline points="${line}" fill="none" stroke="#d4a846" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${yLabels}
    ${xLabels}
  </svg>`;
}
function isThisISOWeek(dateStr){
  const d=new Date(dateStr),now=new Date();
  const day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()+(day===0?-6:1-day));
  mon.setHours(0,0,0,0);
  return d>=mon;
}
function fmtTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function fmtDate(iso){return new Date(iso).toLocaleDateString(getLang()==='fi'?'fi-FI':'en-GB',{day:'numeric',month:'short'});}
function today(){return new Date().toLocaleDateString(getLang()==='fi'?'fi-FI':'en-GB',{weekday:'short',day:'numeric',month:'short'});}

// ═══════════════════════════════════════════════════════════════════
// APP STATE  (single mutable object — we call render() after changes)
// ═══════════════════════════════════════════════════════════════════
const A={
  view:"home",
  blockIdx:initAndGetBlockIdx(),
  activeDayId:getNextDayId(),
  previewBlockIdx:initAndGetBlockIdx(),
  history:getHistory(),
  // Workout session
  sessionExercises:[],
  sessionSets:{},      // {exId:[{reps,weight,done,editing}]}
  sessionStart:null,
  elapsed:0,
  restTimer:null,
  completedSession:null,
  freeExerciseIds:[],
  freeFilter:"All",
  isFreeWorkout:false,
  swapTarget:null,
  chartExercise:null,
  _openSessions:new Set(),
  // Internal timers
  _elapsedInterval:null,
  _restInterval:null,
  _restEndTime:null,
};

// ═══════════════════════════════════════════════════════════════════
// TIMER MANAGEMENT (timestamp-based — survives phone sleep)
// ═══════════════════════════════════════════════════════════════════
function startElapsed(){
  clearInterval(A._elapsedInterval);
  A._elapsedInterval=setInterval(()=>{
    A.elapsed=Math.floor((Date.now()-A.sessionStart)/1000);
    const el=document.getElementById('elapsed-txt');
    if(el)el.textContent=A.isFreeWorkout?`${t('free_workout_label')} · ${fmtTime(A.elapsed)}`:`${t('block_label')} ${BLOCKS[A.blockIdx].id} · ${t('home_day')} ${A.activeDayId} · ${fmtTime(A.elapsed)}`;
  },1000);
}
function stopElapsed(){clearInterval(A._elapsedInterval);A.elapsed=0;}

function startRest(secs){
  if(!secs)return;
  clearInterval(A._restInterval);
  A._restEndTime=Date.now()+secs*1000;
  A.restTimer=secs;
  refreshRestBar();
  A._restInterval=setInterval(tickRest,250);
}
function tickRest(){
  const remaining=Math.ceil((A._restEndTime-Date.now())/1000);
  if(remaining>0){
    A.restTimer=remaining;
    refreshRestBar();
  }else{
    clearInterval(A._restInterval);
    A.restTimer=null;
    A._restEndTime=null;
    refreshRestBar();
  }
}
function skipRest(){clearInterval(A._restInterval);A.restTimer=null;A._restEndTime=null;refreshRestBar();}
function refreshRestBar(){
  const bar=document.getElementById('rest-bar');
  if(!bar)return;
  if(A.restTimer!==null&&A.restTimer>0){
    bar.classList.add('visible');
    const el=bar.querySelector('#rest-time');
    if(el)el.textContent=`${t('workout_rest')} · ${fmtTime(A.restTimer)}`;
  }else{
    bar.classList.remove('visible');
  }
}
// Sync timers when page becomes visible again (after phone sleep)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    if(A._restEndTime)tickRest();
    if(A.sessionStart){
      A.elapsed=Math.floor((Date.now()-A.sessionStart)/1000);
      const el=document.getElementById('elapsed-txt');
      const blk=BLOCKS[A.blockIdx];
      if(el)el.textContent=A.isFreeWorkout?`${t('free_workout_label')} · ${fmtTime(A.elapsed)}`:(blk?`${t('block_label')} ${blk.id} · ${t('home_day')} ${A.activeDayId} · ${fmtTime(A.elapsed)}`:'');
    }
  }
});

// ═══════════════════════════════════════════════════════════════════
// SESSION LOGIC
// ═══════════════════════════════════════════════════════════════════
function buildInitialSets(exercises){
  const init={};
  exercises.forEach(ex=>{
    const lw=getLastWeight(ex.libId)??getLastWeight(ex.id);
    const bump=shouldIncrease(ex.id,ex.repRange[1],ex.libId);
    const w=lw?(bump?String(Math.round(lw*1.025*2)/2):String(lw)):"";
    init[ex.id]=Array.from({length:ex.sets},()=>({reps:"",weight:w,done:false,editing:false}));
  });
  return init;
}

function startWorkout(dayId,block){
  block=block||BLOCKS[A.blockIdx];
  const day=block.days.find(d=>d.id===dayId);
  A.activeDayId=dayId;
  A.sessionExercises=day.exercises.map(e=>({...e}));
  A.sessionSets=buildInitialSets(A.sessionExercises);
  A.sessionStart=Date.now();
  A.elapsed=0;
  A.restTimer=null;
  clearInterval(A._restInterval);A._restEndTime=null;
  startElapsed();
  navigate("workout");
}

function openFreeBuilder(){
  A.freeExerciseIds=[];
  A.freeFilter="All";
  navigate("freeBuilder");
}
function toggleFreeExercise(libId){
  if(A.freeExerciseIds.includes(libId)){
    A.freeExerciseIds=A.freeExerciseIds.filter(id=>id!==libId);
  }else{
    A.freeExerciseIds=[...A.freeExerciseIds,libId];
  }
  render();
}
function setFreeFilter(muscle){
  A.freeFilter=muscle;
  render();
}
function startFreeWorkout(exerciseIds){
  if(!exerciseIds||!exerciseIds.length)return;
  A.sessionExercises=exerciseIds.map(libId=>Ex(0,libId)).filter(Boolean);
  A.sessionSets=buildInitialSets(A.sessionExercises);
  A.sessionStart=Date.now();
  A.elapsed=0;
  A.restTimer=null;
  A.isFreeWorkout=true;
  A.freeExerciseIds=[];
  clearInterval(A._restInterval);A._restEndTime=null;
  startElapsed();
  navigate("workout");
}
function swapExercise(oldId,newEx){
  closeSwap();
  A.sessionExercises=A.sessionExercises.map(e=>e.id===oldId?{...newEx}:e);
  delete A.sessionSets[oldId];
  const lw=getLastWeight(newEx.libId)??getLastWeight(newEx.id);
  const bump=shouldIncrease(newEx.id,newEx.repRange[1],newEx.libId);
  const w=lw?(bump?String(Math.round(lw*1.025*2)/2):String(lw)):"";
  A.sessionSets[newEx.id]=Array.from({length:newEx.sets},()=>({reps:"",weight:w,done:false,editing:false}));
  A.swapTarget=null;
  render();
}

function cycleReps(exId,idx,repRange){
  const sets=A.sessionSets[exId];
  if(!sets)return;
  const current=parseInt(sets[idx].reps);
  const[lo,hi]=repRange;
  const next=(!sets[idx].reps||isNaN(current)||current<=lo-2)?hi:current-1;
  sets[idx]={...sets[idx],reps:String(next)};
  // Only re-render the specific rep button to avoid full page flicker
  const btn=document.getElementById(`rep-btn-${exId}-${idx}`);
  if(btn){
    btn.textContent=String(next);
    btn.classList.add('has-val');
    btn.classList.remove('editing');
    btn.classList.toggle('below-min',next<lo);
    // Update check button opacity
    const chk=document.getElementById(`chk-btn-${exId}-${idx}`);
    if(chk)chk.disabled=false;
  }
}

function markSetDone(exId,idx){
  const sets=A.sessionSets[exId];
  if(!sets||!sets[idx].reps)return;
  const w=parseFloat(sets[idx].weight);
  const ex=A.sessionExercises.find(e=>e.id===exId);
  sets[idx]={...sets[idx],done:true,editing:false};
  if(!isNaN(w)&&w>0)saveWeight(exId,w,ex&&ex.libId);
  startRest(getRestDuration());
  renderSetRow(exId,idx);
  updateProgress();
  updateFinishBtn();
}

function enterEditMode(exId,idx){
  A.sessionSets[exId][idx]={...A.sessionSets[exId][idx],editing:true};
  skipRest();
  renderSetRow(exId,idx);
}

function saveEdit(exId,idx){
  const set=A.sessionSets[exId][idx];
  if(!set.reps)return;
  const w=parseFloat(set.weight);
  const ex=A.sessionExercises.find(e=>e.id===exId);
  if(!isNaN(w)&&w>0)saveWeight(exId,w,ex&&ex.libId);
  A.sessionSets[exId][idx]={...set,done:true,editing:false};
  renderSetRow(exId,idx);
  updateProgress();
  updateFinishBtn();
}

function updateKg(exId,idx,val){
  const sets=A.sessionSets[exId];
  if(!sets)return;
  sets[idx]={...sets[idx],weight:val};
  // Auto-fill forward to all subsequent undone sets
  for(let i=idx+1;i<sets.length;i++){
    if(!sets[i].done){
      sets[i]={...sets[i],weight:val};
      const el=document.getElementById(`kg-inp-${exId}-${i}`);
      if(el)el.value=val;
    }
  }
}

function finishWorkout(){
  if(!allDone())return;
  const isFree=A.isFreeWorkout;
  const block=BLOCKS[A.blockIdx]||BLOCKS[0];
  const session={
    id:Date.now(),
    date:new Date().toISOString(),
    blockId:isFree?"free":block.id,
    blockLabel:isFree?"Free":block.label,
    dayId:isFree?"free":A.activeDayId,
    dayLabel:isFree?t('free_workout_label'):(block.days.find(d=>d.id===A.activeDayId)||{label:A.activeDayId}).label,
    duration:Math.round((Date.now()-A.sessionStart)/60000),
    exercises:A.sessionExercises.map(ex=>({
      id:ex.id,libId:ex.libId,name:ex.name,muscle:ex.muscle,
      sets:(A.sessionSets[ex.id]||[]).map(s=>({reps:s.reps,weight:s.weight,done:s.done}))
    }))
  };
  stopElapsed();
  clearInterval(A._restInterval);A._restEndTime=null;
  A.restTimer=null;
  A.completedSession=session;
  if(isFree){
    navigate("freeComplete");
    return;
  }
  A.history=[...A.history,session];
  ls.set(SK.history,A.history);
  advanceDay(A.activeDayId);
  A.blockIdx=advanceBlockIfNeeded();
  A.previewBlockIdx=A.blockIdx;
  A.activeDayId=getNextDayId();
  navigate("complete");
}

// ═══════════════════════════════════════════════════════════════════
// DERIVED
// ═══════════════════════════════════════════════════════════════════
function doneSets(){return Object.values(A.sessionSets).flat().filter(s=>s.done).length;}
function totalSets(){return Object.values(A.sessionSets).flat().length;}
function allDone(){
  return A.sessionExercises.length>0&&
    A.sessionExercises.every(ex=>{
      const sets=A.sessionSets[ex.id]||[];
      return sets.length>0&&sets.every(s=>s.done);
    });
}

// ═══════════════════════════════════════════════════════════════════
// PARTIAL DOM UPDATES (avoid full re-render during workout)
// ═══════════════════════════════════════════════════════════════════
function renderSetRow(exId,idx){
  const container=document.getElementById(`set-row-${exId}-${idx}`);
  if(!container)return;
  const ex=A.sessionExercises.find(e=>e.id===exId);
  if(!ex)return;
  container.innerHTML=buildSetRowHTML(ex,idx,A.sessionSets[exId][idx]);
  bindSetRowEvents(ex,idx);
}

function updateProgress(){
  const done=doneSets(),total=totalSets();
  const pct=total?Math.round(done/total*100):0;
  const fill=document.getElementById('progress-fill');
  if(fill)fill.style.width=pct+'%';
}

function updateFinishBtn(){
  const btn=document.getElementById('finish-btn');
  if(!btn)return;
  const done=doneSets(),total=totalSets();
  if(allDone()){
    btn.disabled=false;
    btn.textContent=t('workout_finish');
  }else{
    btn.disabled=true;
    btn.textContent=`${done} / ${total} ${t('workout_sets_done')}`;
  }
}

// ═══════════════════════════════════════════════════════════════════
// HTML BUILDERS
// ═══════════════════════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildSetRowHTML(ex,si,set,prevReps=0){
  const repLabel=set.reps?set.reps:(ex.repRange[0]===ex.repRange[1]?`${ex.repRange[0]}`:`${ex.repRange[0]}–${ex.repRange[1]}`);
  const isPlaceholder=!set.reps;
  const isEditing=set.editing===true;
  const isBelowMin=set.reps&&parseInt(set.reps)<ex.repRange[0];

  // Set number cell
  const numCell=set.done&&!isEditing
    ?`<div class="set-num done">✓</div>`
    :`<div class="set-num">${si+1}</div>`;

  // Reps cell
  let repsCell;
  if(!set.done||isEditing){
    const cls='rep-btn'+(isPlaceholder?'':' has-val')+(isEditing?' editing':'')+(isBelowMin?' below-min':'');
    const prevHint=(!set.done&&prevReps>0&&prevReps<ex.repRange[0])
      ?`<span style="display:block;font-size:9px;color:#e05555;margin-top:2px;line-height:1">${t('reps_prev_low')} ${prevReps}</span>`
      :'';
    repsCell=`<div style="display:flex;flex-direction:column;align-items:center"><button id="rep-btn-${ex.id}-${si}" class="${cls}" onclick="cycleReps('${ex.id}',${si},[${ex.repRange}])">${repLabel}</button>${prevHint}</div>`;
  }else{
    repsCell=`<div class="rep-display${isBelowMin?' below-min':''}">${esc(set.reps)}</div>`;
  }

  // KG cell
  let kgCell;
  if(!set.done||isEditing){
    const cls='kg-inp'+(isEditing?' editing':'');
    kgCell=`<input id="kg-inp-${ex.id}-${si}" class="${cls}" type="number" placeholder="kg" value="${esc(set.weight)}"
      oninput="updateKg('${ex.id}',${si},this.value)">`;
  }else{
    kgCell=`<div class="kg-display">${esc(set.weight)}kg</div>`;
  }

  // Action cell
  let actionCell;
  if(isEditing){
    const dim=set.reps?'':'dim';
    actionCell=`<button id="chk-btn-${ex.id}-${si}" class="btn-check ${dim}" onclick="saveEdit('${ex.id}',${si})" ${set.reps?'':'disabled'}>✓</button>`;
  }else if(!set.done){
    const dim=set.reps?'':'dim';
    actionCell=`<button id="chk-btn-${ex.id}-${si}" class="btn-check ${dim}" onclick="markSetDone('${ex.id}',${si})" ${set.reps?'':'disabled'}>✓</button>`;
  }else{
    // Done — double-tap emoji to enter edit mode
    // Use a tap counter approach for mobile double-tap
    actionCell=`<button class="btn-emoji" id="emoji-btn-${ex.id}-${si}" onclick="handleEmojiTap('${ex.id}',${si})">💪🏻</button>`;
  }

  return`${numCell}${repsCell}${kgCell}${actionCell}`;
}

function bindSetRowEvents(ex,idx){
  // kg input — bind imperatively since we can't use oninput with escaped IDs safely
  const kgEl=document.getElementById(`kg-inp-${ex.id}-${idx}`);
  if(kgEl){
    kgEl.oninput=function(){updateKg(ex.id,idx,this.value);};
  }
}

// Double-tap detection for emoji button
const _tapTimers={};
function handleEmojiTap(exId,idx){
  const key=`${exId}-${idx}`;
  if(_tapTimers[key]){
    clearTimeout(_tapTimers[key]);
    delete _tapTimers[key];
    enterEditMode(exId,idx);
  }else{
    _tapTimers[key]=setTimeout(()=>{delete _tapTimers[key];},350);
  }
}

function buildExerciseCard(ex,ei){
  const sets=A.sessionSets[ex.id]||[];
  const exDone=sets.length>0&&sets.every(s=>s.done);
  const bump=shouldIncrease(ex.id,ex.repRange[1],ex.libId);
  const prev=getExerciseHistory(ex.id,ex.libId);
  const lastS=prev.length?prev[prev.length-1]:null;
  const wts=lastS?lastS.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0):[];
  const lastW=wts.length?Math.max(...wts):0;
  const lastR=lastS&&lastS.sets.length?Math.round(lastS.sets.reduce((a,s)=>a+(parseInt(s.reps)||0),0)/lastS.sets.length):0;

  const bumpBadge=bump&&!exDone?`<span class="badge" style="background:#d4a84622;color:#d4a846">${t('workout_load')}</span>`:'';
  const swapBtn=exDone?'':`<button class="btn-swap" onclick="openSwap('${ex.id}','${ex.muscle}')">${t('workout_swap')}</button>`;
  const doneIcon=exDone?'<span style="color:#d4a846">✓ </span>':'';
  const cueText=t('cue_'+(ex.libId||''))||esc(ex.cues);
  const ytUrl=ex.libId&&YOUTUBE[ex.libId];
  const ytBtn=ytUrl?`<a class="yt-btn" href="${ytUrl}" target="_blank" rel="noopener noreferrer" aria-label="${t('yt_aria')}">▶</a>`:'';
  const lastInfo=lastW>0
    ?`<div class="last-info">${t('workout_last')} <span style="color:#f2f0ea;font-weight:600">${lastW}kg × ~${lastR} ${t('workout_reps')}</span>${bump?` <span style="color:#d4a846;font-weight:700">${t('workout_try')} ${Math.round(lastW*1.025*2)/2}kg</span>`:''}</div>`
    :'';

  const lastSetReps=lastS?lastS.sets.map(s=>parseInt(s.reps)||0):[];
  let setsHTML='';
  sets.forEach((set,si)=>{
    setsHTML+=`<div id="set-row-${ex.id}-${si}" class="set-grid">${buildSetRowHTML(ex,si,set,lastSetReps[si]||0)}</div>`;
  });

  return`
  <div class="card ex-card" style="animation-delay:${ei*0.04}s;opacity:${exDone?0.45:1}" id="ex-card-${ex.id}">
    <div class="ex-header">
      <div class="ex-title-area">
        <div class="ex-title">${doneIcon}${esc(t(ex.libId||ex.name))}${ytBtn}<span class="mtag">${esc(t('muscle_'+ex.muscle))}</span></div>
        <div class="ex-meta">${ex.sets} ${t('workout_sets')} · ${ex.repRange[0]}–${ex.repRange[1]} ${t('workout_reps')}</div>
      </div>
      <div class="ex-actions">${bumpBadge}${swapBtn}</div>
    </div>
    <div class="cue-box">💡 ${cueText}</div>
    ${lastInfo}
    <div class="set-col-hdr"><span>${t('workout_col_set')}</span><span>${t('workout_col_reps')}</span><span>${t('workout_col_kg')}</span><span></span></div>
    <div class="hint-text">${t('workout_hint_edit')}</div>
    ${setsHTML}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// SWAP MODAL
// ═══════════════════════════════════════════════════════════════════
function openSwap(exId,muscle){
  A.swapTarget={exId,muscle};
  const alts=LIBRARY[muscle]||[];
  // Current session exercise IDs (to detect "in use")
  const currentIds=A.sessionExercises.map(e=>e.libId||e.id);
  const currentEx=A.sessionExercises.find(e=>e.id===exId);
  const currentLibId=currentEx?(currentEx.libId||currentEx.id):'';
  let items='';
  alts.forEach(alt=>{
    const isActive=alt.id===currentLibId;
    const inUse=!isActive&&currentIds.includes(alt.id);
    const lw=getLastWeight(alt.id);
    const cls='swap-item'+(isActive?' active':inUse?' in-use':' available');
    const click=inUse||isActive?'':`onclick="doSwap('${esc(exId)}','${esc(muscle)}','${esc(alt.id)}')"`;
    const altName=t(alt.id)||esc(alt.name);
    const label=isActive?`✓ ${altName}`:altName;
    const status=isActive?`<div style="font-size:10px;color:#9090b0">${t('workout_current')}</div>`:inUse?`<div style="font-size:10px;color:#9090b0">${t('workout_in_use')}</div>`:'';
    const altCue=t('cue_'+alt.id)||esc(alt.cues);
    const cueRow=(!inUse&&!isActive)?`<div class="swap-cue">💡 ${altCue}</div>`:'';
    items+=`<div class="${cls}" ${click}>
      <div class="swap-row">
        <div>
          <div style="font-weight:700;font-size:14px;color:${isActive?'#d4a846':'#f2f0ea'}">${label}</div>
          <div style="font-size:11px;color:#9090b0;margin-top:2px">${alt.sets} ${t('workout_sets')} · ${alt.repRange[0]}–${alt.repRange[1]} ${t('workout_reps')}</div>
        </div>
        <div style="text-align:right">${lw?`<div style="font-size:12px;font-weight:700;color:#d4a846">${lw}kg</div>`:''}${status}</div>
      </div>${cueRow}
    </div>`;
  });
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.id='swap-modal';
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-hdr">
        <div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px">${t('workout_swap_title')}</div>
          <div style="font-size:12px;color:#9090b0;margin-top:2px">${t('workout_muscle')} <span style="color:#d4a846;font-weight:700">${esc(t('muscle_'+muscle))}</span></div>
        </div>
        <button class="btn-back" style="width:44px;height:44px;font-size:20px;display:flex;align-items:center;justify-content:center" onclick="closeSwap()">✕</button>
      </div>
      <div class="modal-body">${items}</div>
    </div>`;
  document.body.appendChild(modal);
}
// Swap handler: builds a proper session exercise from library entry
function doSwap(oldId,muscle,libId){
  const libEx=LIBRARY[muscle].find(x=>x.id===libId);
  if(!libEx)return;
  const oldEx=A.sessionExercises.find(e=>e.id===oldId);
  // Build a new exercise with a unique session ID
  const bn=oldId.match(/^b(\d+)/);
  const blockNum=bn?bn[1]:'0';
  const newEx={
    id:`b${blockNum}_${libId.replace('lib_','')}`,
    libId:libId,
    name:libEx.name,
    muscle:muscle,
    sets:libEx.sets,
    repRange:libEx.repRange,
    cues:libEx.cues
  };
  swapExercise(oldId,newEx);
}
function closeSwap(){
  const m=document.getElementById('swap-modal');
  if(m)m.remove();
  A.swapTarget=null;
}

function exportCSV(){
  const rows=[['Date','Day','Block','Exercise','Set','Reps','Weight(kg)','Duration(min)','Partial']];
  A.history.forEach(s=>{
    (s.exercises||[]).forEach(ex=>{
      (ex.sets||[]).forEach((st,si)=>{
        rows.push([s.date,s.dayLabel||s.dayId,s.blockId||'',ex.name||ex.libId,si+1,st.reps,st.weight,s.duration,s.partial?'yes':'']);
      });
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`rautaloki_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
function importCSV(){
  const input=document.createElement('input');
  input.type='file';input.accept='.csv';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const lines=ev.target.result.split('\n').filter(l=>l.trim());
        if(lines.length<2)throw 0;
        const hdr=lines[0];
        const sessions={};
        for(let i=1;i<lines.length;i++){
          const cols=[];
          let m,re=/(".*?"|[^,]*)(,|$)/g;
          while((m=re.exec(lines[i]))!==null){cols.push(m[1]);if(m[2]==='')break;}
          const clean=cols.map(c=>c.replace(/^"|"$/g,'').replace(/""/g,'"'));
          const [date,day,block,exName,setNum,reps,weight,duration,partial]=clean;
          const key=date+'|'+day+'|'+block;
          if(!sessions[key])sessions[key]={id:Date.now()+i,date,dayId:day,dayLabel:day,blockId:block,blockLabel:block,
            duration:parseInt(duration)||0,partial:partial==='yes',exercises:{}};
          if(!sessions[key].exercises[exName])sessions[key].exercises[exName]={id:exName,libId:exName,name:exName,muscle:'',sets:[]};
          sessions[key].exercises[exName].sets.push({reps:reps||'',weight:weight||'',done:true});
        }
        const imported=Object.values(sessions).map(s=>({...s,exercises:Object.values(s.exercises)}));
        A.history=[...A.history,...imported];
        ls.set(SK.history,A.history);
        alert(`${t('settings_import_done')} ${imported.length} ${t('settings_import_sessions')}`);
        render();
      }catch(err){alert(t('settings_import_error'));}
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmFreeWorkout(){
  const saveCb=document.getElementById('free-save-cb');
  const nameInp=document.getElementById('free-name-inp');
  const countCb=document.getElementById('free-count-cb');
  const wantsCount=countCb&&countCb.checked;
  const s=A.completedSession;
  if(s){
    // Assign blockId based on progression choice
    s.blockId=wantsCount?BLOCKS[A.blockIdx].id:"free";
    s.blockLabel=wantsCount?BLOCKS[A.blockIdx].label:"Free";
    A.history=[...A.history,s];
    ls.set(SK.history,A.history);
  }
  if(saveCb&&saveCb.checked&&s){
    const name=(nameInp&&nameInp.value.trim())||t('free_workout_label');
    saveCustomWorkout(name,s.exercises.map(e=>e.libId).filter(Boolean));
  }
  if(wantsCount){
    advanceDay(A.activeDayId);
    A.blockIdx=advanceBlockIfNeeded();
    A.previewBlockIdx=A.blockIdx;
    A.activeDayId=getNextDayId();
  }
  A.isFreeWorkout=false;
  navigate("complete");
}
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  // Show onboarding if no profile
  if(!getProfile()&&A.view!=='onboarding'){A.view='onboarding';}
  let html='';
  if(A.view==='onboarding')html=viewOnboarding();
  else if(A.view==='home')html=viewHome();
  else if(A.view==='workout')html=viewWorkout();
  else if(A.view==='complete')html=viewComplete();
  else if(A.view==='history')html=viewHistory();
  else if(A.view==='program')html=viewProgram();
  else if(A.view==='settings')html=viewSettings();
  else if(A.view==='freeBuilder')html=viewFreeBuilder();
  else if(A.view==='freeComplete')html=viewFreeComplete();
  app.innerHTML=html;
  // After render, bind kg inputs (oninput in HTML attr can't pass complex args)
  if(A.view==='workout'){
    A.sessionExercises.forEach(ex=>{
      (A.sessionSets[ex.id]||[]).forEach((_,idx)=>{
        const el=document.getElementById(`kg-inp-${ex.id}-${idx}`);
        if(el){
          const exId=ex.id;
          const i=idx;
          el.oninput=function(){updateKg(exId,i,this.value);};
        }
      });
    });
    // Re-attach rest bar state
    refreshRestBar();
  }
}
